<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#ff7a8a" />
<title>ふたり旅プラン</title>

<!-- iPhone「ホーム画面に追加」用 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ふたり旅" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="manifest.json" />

<style>
  :root{
    --pink:#ff7a8a; --pink-d:#f25c70; --teal:#16b3a6; --teal-d:#0e8f85;
    --bg:#fbf7f4; --card:#ffffff; --ink:#33303a; --sub:#8d8794;
    --line:#eee3dc; --soft:#fff2ef; --soft2:#eafaf8;
    --shadow:0 6px 22px rgba(120,90,90,.10);
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}

  /* ===== ヘッダー ===== */
  header{
    background:linear-gradient(135deg,var(--pink),#ff9e8a);
    color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 16px 16px;
    box-shadow:var(--shadow); position:sticky; top:0; z-index:30;
  }
  .h-top{display:flex;align-items:center;gap:10px}
  .h-top h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.04em;flex:1}
  .h-top .icon-btn{font-size:20px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center}
  .trip-pick{margin-top:12px;display:flex;align-items:center;gap:8px}
  .trip-pick select{
    flex:1;background:rgba(255,255,255,.92);border:none;border-radius:12px;
    padding:10px 12px;font-weight:700;color:var(--ink)
  }
  .countdown{
    margin-top:12px;background:rgba(255,255,255,.16);border-radius:14px;
    padding:10px 14px;display:flex;align-items:baseline;gap:8px;backdrop-filter:blur(4px)
  }
  .countdown .big{font-size:30px;font-weight:800;line-height:1}
  .countdown .lbl{font-size:13px;opacity:.92}
  .countdown .date{margin-left:auto;font-size:12px;opacity:.85;text-align:right}

  /* ===== タブ ===== */
  nav.tabs{
    display:flex;gap:6px;overflow-x:auto;padding:10px 12px;background:var(--card);
    position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);
    -webkit-overflow-scrolling:touch;scrollbar-width:none
  }
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{
    white-space:nowrap;padding:8px 14px;border-radius:999px;font-size:14px;font-weight:600;
    color:var(--sub);background:var(--bg);flex:0 0 auto
  }
  nav.tabs button.on{background:var(--pink);color:#fff;box-shadow:0 3px 10px rgba(242,92,112,.35)}

  /* ===== コンテンツ ===== */
  main{padding:14px 14px 96px;max-width:680px;margin:0 auto}
  .sec-title{display:flex;align-items:center;gap:8px;margin:4px 2px 12px}
  .sec-title h2{font-size:17px;margin:0;font-weight:700}
  .sec-title .hint{font-size:12px;color:var(--sub);margin-left:auto}

  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
    padding:14px;margin-bottom:12px;border:1px solid var(--line)}
  .card .row1{display:flex;align-items:flex-start;gap:10px}
  .card .ttl{font-weight:700;font-size:15px;flex:1}
  .card .meta{font-size:13px;color:var(--sub);margin-top:3px}
  .card .note{font-size:14px;margin-top:8px;white-space:pre-wrap;color:#56505c}
  .card a.link{font-size:13px;color:var(--teal-d);font-weight:600;text-decoration:none;
    display:inline-flex;align-items:center;gap:4px;margin-top:8px}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
    background:var(--soft2);color:var(--teal-d);margin-right:6px}
  .tag.pink{background:var(--soft);color:var(--pink-d)}

  .empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:14px}
  .empty .em{font-size:40px;display:block;margin-bottom:10px}

  /* like ボタン */
  .likes{display:flex;gap:8px;margin-top:10px}
  .like-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;
    padding:6px 11px;border-radius:999px;background:var(--bg);color:var(--sub);border:1px solid var(--line)}
  .like-btn.on{background:var(--soft);color:var(--pink-d);border-color:#ffd2d8}

  .mini-btn{font-size:12px;color:var(--sub);padding:6px;border-radius:8px}
  .mini-btn.del:active{color:var(--pink-d)}

  /* チェックリスト行 */
  .check-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);
    border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .check-row .box{width:24px;height:24px;border-radius:7px;border:2px solid #d8cfca;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
  .check-row.done .box{background:var(--teal);border-color:var(--teal)}
  .check-row.done .nm{text-decoration:line-through;color:var(--sub)}
  .check-row .nm{flex:1;font-size:15px}
  .group-h{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.06em;
    margin:16px 4px 8px;text-transform:uppercase}

  /* 予算サマリ */
  .summary{display:flex;gap:10px;margin-bottom:14px}
  .summary .box{flex:1;background:var(--card);border-radius:14px;padding:12px;text-align:center;
    box-shadow:var(--shadow);border:1px solid var(--line)}
  .summary .box .n{font-size:20px;font-weight:800}
  .summary .box .l{font-size:11px;color:var(--sub);margin-top:2px}
  .settle{background:linear-gradient(135deg,var(--teal),#3fd1c4);color:#fff;border-radius:14px;
    padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);font-weight:700}
  .settle small{display:block;font-weight:500;opacity:.9;font-size:12px;margin-bottom:4px}

  /* FAB */
  .fab{position:fixed;right:18px;bottom:calc(20px + env(safe-area-inset-bottom));
    width:58px;height:58px;border-radius:50%;background:var(--pink);color:#fff;font-size:30px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(242,92,112,.45);z-index:40}
  .fab:active{transform:scale(.94)}

  /* ===== モーダル ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(40,30,35,.45);z-index:50;display:none;
    align-items:flex-end;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    padding:20px 18px calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;
    animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .modal h3{margin:0 0 16px;font-size:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink)}
  .field textarea{min-height:80px;resize:vertical}
  .field .two{display:flex;gap:10px}
  .field .two>*{flex:1}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:15px;text-align:center}
  .btn.primary{background:var(--pink);color:#fff}
  .btn.ghost{background:var(--bg);color:var(--sub)}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .seg button{padding:8px 12px;border-radius:10px;background:var(--bg);font-size:13px;font-weight:600;color:var(--sub);border:1.5px solid var(--line)}
  .seg button.on{background:var(--pink);color:#fff;border-color:var(--pink)}

  /* 同期状態 */
  .sync-dot{width:9px;height:9px;border-radius:50%;background:#cfc6c0}
  .sync-dot.on{background:#46d39a;box-shadow:0 0 0 3px rgba(70,211,154,.25)}
  .sync-dot.err{background:#ffb24d}
  .note-box{background:var(--soft2);border-radius:12px;padding:12px;font-size:13px;color:var(--teal-d);margin-bottom:14px;line-height:1.6}
</style>
</head>
<body>

<header>
  <div class="h-top">
    <h1>💕 ふたり旅プラン</h1>
    <button class="icon-btn" id="btnSync" title="同期">🔗</button>
    <button class="icon-btn" id="btnSettings" title="設定">⚙️</button>
  </div>
  <div class="trip-pick">
    <select id="tripSelect"></select>
    <button class="icon-btn" id="btnNewTrip" title="新しい旅行">＋</button>
  </div>
  <div class="countdown" id="countdown"></div>
</header>

<nav class="tabs" id="tabs"></nav>
<main id="main"></main>

<button class="fab" id="fab">＋</button>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* ============================================================
   状態管理
============================================================ */
const TABS = [
  { id:'cand',  icon:'📍', label:'候補地' },
  { id:'plan',  icon:'🗓', label:'しおり' },
  { id:'wish',  icon:'⭐️', label:'行きたい' },
  { id:'money', icon:'💰', label:'予算' },
  { id:'pack',  icon:'🧳', label:'持ち物' },
  { id:'resv',  icon:'🎫', label:'予約' },
];
const CLIENT_ID = Math.random().toString(36).slice(2);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

let state = loadState();
let ui = { tab:'cand' };
let db = null, unsub = null, syncReady = false;
let saveTimer = null;

function blankTrip(title){
  return {
    id: uid(), title: title||'はじめての旅行', destination:'',
    startDate:'', endDate:'',
    candidates:[], itinerary:[], wishlist:[], expenses:[], packing:[], reservations:[]
  };
}
function defaultState(){
  const t = blankTrip('はじめての旅行');
  return {
    trips:[t], currentTripId:t.id,
    members:['わたし','パートナー'],
    me:0,                 // この端末の人 (0/1)
    pairCode:'',          // 同期コード
    firebaseConfig:'',    // 貼り付けたJSON文字列
    updatedAt:0
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem('futari-trip');
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    if(!s.trips || !s.trips.length) return defaultState();
    s.members = s.members || ['わたし','パートナー'];
    if(typeof s.me!=='number') s.me=0;
    return s;
  }catch(e){ return defaultState(); }
}
function persist(){
  state.updatedAt = Date.now();
  localStorage.setItem('futari-trip', JSON.stringify(state));
  pushToCloud();
}
function save(){ persist(); render(); }

function curTrip(){
  return state.trips.find(t=>t.id===state.currentTripId) || state.trips[0];
}

/* ============================================================
   クラウド同期 (Firebase / 任意)
============================================================ */
function initSync(){
  if(unsub){ unsub(); unsub=null; }
  syncReady = false; db = null;
  updateSyncDot();
  if(!state.firebaseConfig || !state.pairCode) return;
  let cfg;
  try{ cfg = JSON.parse(state.firebaseConfig); }
  catch(e){ updateSyncDot('err'); return; }
  try{
    const app = initializeApp(cfg, 'futari-'+state.pairCode);
    db = getFirestore(app);
    const ref = doc(db, 'pairs', 'trip-'+state.pairCode);
    unsub = onSnapshot(ref, snap=>{
      syncReady = true; updateSyncDot('on');
      const data = snap.data();
      if(data && data.payload){
        try{
          const remote = JSON.parse(data.payload);
          if(remote.updatedAt > (state.updatedAt||0) && data.by!==CLIENT_ID){
            const keepMe = state.me, keepCode=state.pairCode, keepCfg=state.firebaseConfig;
            state = remote;
            state.me = keepMe; state.pairCode = keepCode; state.firebaseConfig = keepCfg;
            localStorage.setItem('futari-trip', JSON.stringify(state));
            render();
          }
        }catch(e){}
      }
    }, err=>{ updateSyncDot('err'); });
  }catch(e){ updateSyncDot('err'); }
}
function pushToCloud(){
  if(!db || !syncReady) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const ref = doc(db, 'pairs', 'trip-'+state.pairCode);
      await setDoc(ref, { payload: JSON.stringify(state), by: CLIENT_ID, ts: Date.now() });
    }catch(e){ updateSyncDot('err'); }
  }, 600);
}
function updateSyncDot(s){
  const btn = document.getElementById('btnSync');
  if(!state.firebaseConfig || !state.pairCode){ btn.textContent='🔗'; return; }
  btn.textContent = s==='on' ? '🟢' : s==='err' ? '🟠' : '🔗';
}

/* ============================================================
   描画
============================================================ */
function render(){
  renderHeader();
  renderTabs();
  renderMain();
}

function renderHeader(){
  // トリップ選択
  const sel = document.getElementById('tripSelect');
  sel.innerHTML = state.trips.map(t=>
    `<option value="${t.id}" ${t.id===state.currentTripId?'selected':''}>${esc(t.title)}</option>`).join('');
  // カウントダウン
  const t = curTrip();
  const cd = document.getElementById('countdown');
  if(t.startDate){
    const days = daysUntil(t.startDate);
    const dateStr = fmtRange(t.startDate, t.endDate);
    let big, lbl;
    if(days>0){ big=days; lbl='日後に出発！'; }
    else if(days===0){ big='当日'; lbl='いってらっしゃい🎉'; }
    else { big=Math.abs(days); lbl='日前に行った旅'; }
    cd.style.display='flex';
    cd.innerHTML = `<span class="big">${big}</span><span class="lbl">${lbl}</span>
      <span class="date">${t.destination?esc(t.destination)+'<br>':''}${dateStr}</span>`;
  } else {
    cd.style.display='flex';
    cd.innerHTML = `<span class="lbl">📅 行き先と日程を設定すると、出発までカウントダウンが出ます</span>`;
  }
}

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t=>
    `<button data-tab="${t.id}" class="${ui.tab===t.id?'on':''}">${t.icon} ${t.label}</button>`).join('');
}

function renderMain(){
  const m = document.getElementById('main');
  const t = curTrip();
  const R = { cand:renderCand, plan:renderPlan, wish:renderWish, money:renderMoney, pack:renderPack, resv:renderResv };
  m.innerHTML = R[ui.tab](t);
  // 同期ボタンの色更新
  updateSyncDot(syncReady?'on':undefined);
}

/* ---------- 候補地 ---------- */
function renderCand(t){
  let h = secTitle('📍 旅行の候補地', '2人で♥を押して行きたい所を選ぼう');
  if(!t.candidates.length) return h + empty('🗺','候補地がまだありません','右下の＋から、気になる場所を追加してみましょう');
  // いいねが多い順
  const sorted = [...t.candidates].sort((a,b)=>(b.likedBy?.length||0)-(a.likedBy?.length||0));
  h += sorted.map(c=>{
    const liked = c.likedBy||[];
    const both = liked.length===2;
    return `<div class="card" data-edit-type="cand" data-id="${c.id}">
      <div class="row1">
        <div class="ttl">${both?'💞 ':''}${esc(c.name)}</div>
        <button class="mini-btn del" data-del="cand" data-id="${c.id}">🗑</button>
      </div>
      ${c.area?`<div class="meta">📍 ${esc(c.area)}</div>`:''}
      ${c.note?`<div class="note">${esc(c.note)}</div>`:''}
      ${linkHtml(c.url)}
      <div class="likes">
        ${state.members.map((nm,i)=>{
          const on = liked.includes(i);
          return `<button class="like-btn ${on?'on':''}" data-like="${c.id}" data-mi="${i}">
            ${on?'❤️':'🤍'} ${esc(nm)}</button>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  return h;
}

/* ---------- しおり(日程) ---------- */
function renderPlan(t){
  let h = secTitle('🗓 旅のしおり', '日付ごとに予定を並べよう');
  if(!t.itinerary.length) return h + empty('🗓','まだ予定がありません','＋から、時間と行き先を追加しましょう');
  const items = [...t.itinerary].sort((a,b)=>
    (a.day||'').localeCompare(b.day||'') || (a.time||'').localeCompare(b.time||''));
  let lastDay = null;
  items.forEach(it=>{
    if(it.day!==lastDay){
      h += `<div class="group-h">${it.day?fmtDay(it.day):'日付未設定'}</div>`;
      lastDay = it.day;
    }
    h += `<div class="card" data-edit-type="plan" data-id="${it.id}">
      <div class="row1">
        <div class="ttl">${it.time?`<span class="tag">${esc(it.time)}</span>`:''}${esc(it.title)}</div>
        <button class="mini-btn del" data-del="plan" data-id="${it.id}">🗑</button>
      </div>
      ${it.place?`<div class="meta">📍 ${esc(it.place)}</div>`:''}
      ${it.note?`<div class="note">${esc(it.note)}</div>`:''}
      ${linkHtml(it.url)}
    </div>`;
  });
  return h;
}

/* ---------- 行きたい場所 ---------- */
function renderWish(t){
  let h = secTitle('⭐️ 行きたい場所メモ', '気になるスポットをストック');
  if(!t.wishlist.length) return h + empty('⭐️','まだメモがありません','カフェ・観光地・お店など、行きたい所を追加');
  const cats = {};
  t.wishlist.forEach(w=>{ (cats[w.category||'その他'] ??= []).push(w); });
  for(const cat in cats){
    h += `<div class="group-h">${esc(cat)}</div>`;
    h += cats[cat].map(w=>`<div class="card" data-edit-type="wish" data-id="${w.id}">
      <div class="row1">
        <div class="ttl" style="${w.done?'text-decoration:line-through;color:var(--sub)':''}">${esc(w.name)}</div>
        <button class="mini-btn" data-wishdone="${w.id}">${w.done?'↩️':'✅'}</button>
        <button class="mini-btn del" data-del="wish" data-id="${w.id}">🗑</button>
      </div>
      ${w.note?`<div class="note">${esc(w.note)}</div>`:''}
      ${linkHtml(w.url)}
    </div>`).join('');
  }
  return h;
}

/* ---------- 予算・割り勘 ---------- */
function renderMoney(t){
  let h = secTitle('💰 支出・割り勘', 'タップで編集／記録すると自動精算');
  const exp = t.expenses;
  const total = exp.reduce((s,e)=>s+(+e.amount||0),0);
  // 各自の支払い & 負担
  const paid=[0,0], owe=[0,0];
  exp.forEach(e=>{
    const amt=+e.amount||0; const by=e.paidBy??0;
    paid[by]+=amt;
    const sw = (e.splitWith&&e.splitWith.length)?e.splitWith:[0,1];
    const each = amt/sw.length;
    sw.forEach(m=>owe[m]+=each);
  });
  const net0 = paid[0]-owe[0]; // +なら受け取る
  h += `<div class="summary">
    <div class="box"><div class="n">¥${yen(total)}</div><div class="l">合計</div></div>
    <div class="box"><div class="n">¥${yen(paid[0])}</div><div class="l">${esc(state.members[0])}の支払</div></div>
    <div class="box"><div class="n">¥${yen(paid[1])}</div><div class="l">${esc(state.members[1])}の支払</div></div>
  </div>`;
  if(Math.round(net0)!==0){
    const from = net0<0 ? state.members[0] : state.members[1];
    const to   = net0<0 ? state.members[1] : state.members[0];
    h += `<div class="settle"><small>精算</small>💸 ${esc(from)} → ${esc(to)} に <b>¥${yen(Math.abs(Math.round(net0)))}</b> 渡すと割り勘完了！</div>`;
  } else if(exp.length){
    h += `<div class="settle"><small>精算</small>✅ ぴったり割り勘できています</div>`;
  }
  if(!exp.length) return h + empty('💰','まだ支出がありません','＋から、使ったお金を記録しましょう');
  const sorted=[...exp].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  h += sorted.map(e=>`<div class="card" data-edit-type="money" data-id="${e.id}">
    <div class="row1">
      <div class="ttl">${esc(e.title)} <span class="tag pink">¥${yen(+e.amount||0)}</span></div>
      <button class="mini-btn del" data-del="money" data-id="${e.id}">🗑</button>
    </div>
    <div class="meta">${e.category?esc(e.category)+'・':''}${esc(state.members[e.paidBy??0])}が支払${e.date?'・'+fmtDay(e.date):''}</div>
  </div>`).join('');
  return h;
}

/* ---------- 持ち物 ---------- */
function renderPack(t){
  let h = secTitle('🧳 持ち物チェック', 'タップでチェック');
  if(!t.packing.length) return h + empty('🧳','まだ持ち物がありません','＋から追加。「基本セット」を一括追加もできます');
  const done = t.packing.filter(p=>p.checked).length;
  h += `<div class="note-box">✅ ${done} / ${t.packing.length} 個 準備OK</div>`;
  const cats={};
  t.packing.forEach(p=>{ (cats[p.category||'その他'] ??= []).push(p); });
  for(const cat in cats){
    h += `<div class="group-h">${esc(cat)}</div>`;
    h += cats[cat].map(p=>`<div class="check-row ${p.checked?'done':''}" data-pack="${p.id}">
      <div class="box">${p.checked?'✓':''}</div>
      <div class="nm">${esc(p.name)}</div>
      <button class="mini-btn del" data-del="pack" data-id="${p.id}">🗑</button>
    </div>`).join('');
  }
  return h;
}

/* ---------- 予約情報 ---------- */
function renderResv(t){
  let h = secTitle('🎫 予約情報', 'ホテル・交通・お店の予約を保管');
  if(!t.reservations.length) return h + empty('🎫','まだ予約がありません','＋から予約番号や時間を記録しましょう');
  const sorted=[...t.reservations].sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||''));
  h += sorted.map(r=>`<div class="card" data-edit-type="resv" data-id="${r.id}">
    <div class="row1">
      <div class="ttl"><span class="tag">${esc(r.type||'予約')}</span>${esc(r.title)}</div>
      <button class="mini-btn del" data-del="resv" data-id="${r.id}">🗑</button>
    </div>
    ${r.datetime?`<div class="meta">🕒 ${fmtDateTime(r.datetime)}</div>`:''}
    ${r.place?`<div class="meta">📍 ${esc(r.place)}</div>`:''}
    ${r.confirmationNo?`<div class="meta">🔢 予約番号：<b>${esc(r.confirmationNo)}</b></div>`:''}
    ${r.note?`<div class="note">${esc(r.note)}</div>`:''}
    ${linkHtml(r.url)}
  </div>`).join('');
  return h;
}

/* ============================================================
   モーダル (追加フォーム)
============================================================ */
function openModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }

function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

const TYPE_KEY = {cand:'candidates',plan:'itinerary',wish:'wishlist',money:'expenses',pack:'packing',resv:'reservations'};
function findItem(type,id){ return (curTrip()[TYPE_KEY[type]]||[]).find(x=>x.id===id); }

function addModal(){ openForm(ui.tab, null); }

function openForm(type, item){
  const d = item || {};
  const ed = item ? item.id : '';
  const splitVal = (d.splitWith && d.splitWith.length===1) ? String(d.splitWith[0]) : 'both';
  const forms = {
    cand:()=>formCard(item?'候補地を編集':'候補地を追加','cand',`
      ${f('候補地の名前','c_name','例：京都・嵐山',null,d.name)}
      ${f('エリア / 地域','c_area','例：京都府',null,d.area)}
      ${fArea('メモ','c_note','行きたい理由、見どころなど',d.note)}
      ${f('リンク (URL)','c_url','公式サイトや地図のURL',null,d.url)}
    `,ed),
    plan:()=>formCard(item?'予定を編集':'予定を追加','plan',`
      ${fDate('日付','p_day',d.day)}
      ${f('時間','p_time','例：10:00','time',d.time)}
      ${f('予定タイトル','p_title','例：清水寺を観光',null,d.title)}
      ${f('場所','p_place','例：清水寺',null,d.place)}
      ${fArea('メモ','p_note','',d.note)}
      ${f('リンク (URL)','p_url','',null,d.url)}
    `,ed),
    wish:()=>formCard(item?'行きたい場所を編集':'行きたい場所を追加','wish',`
      ${f('名前','w_name','例：％アラビカ 京都',null,d.name)}
      ${fSel('カテゴリ','w_cat',['カフェ・グルメ','観光地','ショッピング','体験・アクティビティ','その他'],d.category)}
      ${fArea('メモ','w_note','',d.note)}
      ${f('リンク (URL)','w_url','',null,d.url)}
    `,ed),
    money:()=>formCard(item?'支出を編集':'支出を追加','money',`
      ${f('内容','m_title','例：ホテル代',null,d.title)}
      ${f('金額 (円)','m_amount','例：12000','number',d.amount)}
      ${fSel('支払った人','m_paid',state.members,d.paidBy??0)}
      ${fSel('カテゴリ','m_cat',['宿泊','交通','食事','観光・入場','買い物','その他'],d.category)}
      ${fDate('日付','m_date',d.date)}
      <div class="field"><label>割り勘の対象</label>
        <div class="seg" id="m_split">
          <button type="button" data-split="both" class="${splitVal==='both'?'on':''}">2人で割る</button>
          <button type="button" data-split="0" class="${splitVal==='0'?'on':''}">${esc(state.members[0])}だけ</button>
          <button type="button" data-split="1" class="${splitVal==='1'?'on':''}">${esc(state.members[1])}だけ</button>
        </div></div>
    `,ed),
    pack:()=>formCard(item?'持ち物を編集':'持ち物を追加','pack',`
      ${f('持ち物の名前','k_name','例：充電器',null,d.name)}
      ${fSel('カテゴリ','k_cat',['身の回り','衣類','洗面・コスメ','ガジェット','書類・お金','その他'],d.category)}
      ${item?'':'<div class="note-box" id="packPreset" style="cursor:pointer">📦 タップで「旅行の基本セット」をまとめて追加</div>'}
    `,ed),
    resv:()=>formCard(item?'予約情報を編集':'予約情報を追加','resv',`
      ${fSel('種類','r_type',['ホテル','新幹線・電車','飛行機','レンタカー','レストラン','アクティビティ','その他'],d.type)}
      ${f('名称','r_title','例：◯◯ホテル',null,d.title)}
      ${f('日時','r_dt','','datetime-local',d.datetime)}
      ${f('場所','r_place','',null,d.place)}
      ${f('予約番号','r_conf','確認番号など',null,d.confirmationNo)}
      ${fArea('メモ','r_note','',d.note)}
      ${f('リンク (URL)','r_url','',null,d.url)}
    `,ed),
  };
  openModal(forms[type]());
  // 割り勘セグメント
  const split = document.getElementById('m_split');
  if(split){ split.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    [...split.children].forEach(x=>x.classList.remove('on')); b.classList.add('on');
  }); }
  // 持ち物プリセット
  const pp = document.getElementById('packPreset');
  if(pp){ pp.addEventListener('click',()=>{ addPackPreset(); closeModal(); }); }
}

function saveFromModal(type, editId){
  const t = curTrip();
  const arr = t[TYPE_KEY[type]];
  const old = editId ? arr.find(x=>x.id===editId) : null;
  let obj;
  if(type==='cand'){
    if(!val('c_name')) return;
    obj={name:val('c_name'),area:val('c_area'),note:val('c_note'),url:val('c_url')};
  }
  if(type==='plan'){
    if(!val('p_title')) return;
    obj={day:val('p_day'),time:val('p_time'),title:val('p_title'),place:val('p_place'),note:val('p_note'),url:val('p_url')};
  }
  if(type==='wish'){
    if(!val('w_name')) return;
    obj={name:val('w_name'),category:val('w_cat'),note:val('w_note'),url:val('w_url')};
  }
  if(type==='money'){
    if(!val('m_title')||!val('m_amount')) return;
    const seg=document.querySelector('#m_split .on')?.dataset.split||'both';
    obj={title:val('m_title'),amount:+val('m_amount'),paidBy:+val('m_paid')||0,
      category:val('m_cat'),date:val('m_date'),splitWith:seg==='both'?[0,1]:[+seg]};
  }
  if(type==='pack'){
    if(!val('k_name')) return;
    obj={name:val('k_name'),category:val('k_cat')};
  }
  if(type==='resv'){
    if(!val('r_title')) return;
    obj={type:val('r_type'),title:val('r_title'),datetime:val('r_dt'),
      place:val('r_place'),confirmationNo:val('r_conf'),note:val('r_note'),url:val('r_url')};
  }
  if(old){ Object.assign(old, obj); }
  else { arr.push(Object.assign({id:uid(), likedBy:[], done:false, checked:false}, obj)); }
  closeModal(); save();
}

function addPackPreset(){
  const t = curTrip();
  const preset = {
    '身の回り':['財布','鍵','常備薬','マスク'],
    '衣類':['着替え','下着','パジャマ','上着'],
    '洗面・コスメ':['歯ブラシ','スキンケア','メイク道具'],
    'ガジェット':['充電器','モバイルバッテリー','イヤホン'],
    '書類・お金':['身分証','クレジットカード','現金']
  };
  for(const cat in preset) preset[cat].forEach(n=>
    t.packing.push({id:uid(),name:n,category:cat,checked:false}));
  save();
}

/* ============================================================
   設定 & 同期モーダル
============================================================ */
function settingsModal(){
  openModal(`<h3>⚙️ 設定</h3>
    <div class="field"><label>2人の名前</label>
      <div class="two">
        <input id="s_m0" value="${esc(state.members[0])}" />
        <input id="s_m1" value="${esc(state.members[1])}" />
      </div>
    </div>
    <div class="field"><label>この端末を使う人</label>
      <div class="seg" id="s_me">
        <button type="button" data-me="0" class="${state.me===0?'on':''}">${esc(state.members[0])}</button>
        <button type="button" data-me="1" class="${state.me===1?'on':''}">${esc(state.members[1])}</button>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <div class="field"><label>この旅行のタイトル</label>
      <input id="s_title" value="${esc(curTrip().title)}" /></div>
    <div class="field"><label>行き先（決定）</label>
      <input id="s_dest" value="${esc(curTrip().destination)}" placeholder="例：京都" /></div>
    <div class="field"><label>日程</label>
      <div class="two">
        <input id="s_start" type="date" value="${curTrip().startDate}" />
        <input id="s_end" type="date" value="${curTrip().endDate}" />
      </div></div>
    <div class="modal-actions">
      <button class="btn ghost" id="s_delTrip">この旅行を削除</button>
      <button class="btn primary" id="s_save">保存</button>
    </div>`);
  document.getElementById('s_me').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on')); b.classList.add('on');
  });
  document.getElementById('s_save').onclick=()=>{
    state.members=[val('s_m0')||'わたし', val('s_m1')||'パートナー'];
    state.me=+document.querySelector('#s_me .on').dataset.me;
    const t=curTrip();
    t.title=val('s_title')||t.title; t.destination=val('s_dest');
    t.startDate=val('s_start'); t.endDate=val('s_end');
    closeModal(); save();
  };
  document.getElementById('s_delTrip').onclick=()=>{
    if(state.trips.length<=1){ alert('最後の1つは削除できません'); return; }
    if(!confirm('この旅行を削除しますか？')) return;
    state.trips=state.trips.filter(x=>x.id!==state.currentTripId);
    state.currentTripId=state.trips[0].id;
    closeModal(); save();
  };
}

function syncModal(){
  const linked = state.firebaseConfig && state.pairCode;
  openModal(`<h3>🔗 2人で同期</h3>
    <div class="note-box">
      <b>ペアコード</b>と<b>Firebase設定</b>を2人で同じものにすると、入力した内容がリアルタイムで共有されます。<br>
      設定方法は同梱の「セットアップガイド」を見てください。
    </div>
    <div class="field"><label>ペアコード（2人で同じ合言葉）</label>
      <input id="y_code" value="${esc(state.pairCode)}" placeholder="例：tokyo-love-2026" /></div>
    <div class="field"><label>Firebase設定（firebaseConfig を貼り付け）</label>
      <textarea id="y_cfg" placeholder='{ "apiKey":"...", "projectId":"...", ... }' style="min-height:120px;font-size:13px">${esc(state.firebaseConfig)}</textarea></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span class="sync-dot ${syncReady?'on':''}"></span>
      <span style="font-size:13px;color:var(--sub)">${linked?(syncReady?'接続中':'接続待ち…'):'未接続'}</span>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="y_off">同期オフ</button>
      <button class="btn primary" id="y_save">接続する</button>
    </div>`);
  document.getElementById('y_save').onclick=()=>{
    state.pairCode=val('y_code'); state.firebaseConfig=val('y_cfg');
    closeModal(); persist(); initSync(); render();
  };
  document.getElementById('y_off').onclick=()=>{
    state.pairCode=''; state.firebaseConfig='';
    closeModal(); persist(); initSync(); render();
  };
}

/* ============================================================
   イベント
============================================================ */
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  ui.tab=b.dataset.tab; render();
});
document.getElementById('fab').addEventListener('click',addModal);
document.getElementById('btnSettings').addEventListener('click',settingsModal);
document.getElementById('btnSync').addEventListener('click',syncModal);
document.getElementById('btnNewTrip').addEventListener('click',()=>{
  const name=prompt('新しい旅行の名前は？','次の旅行');
  if(name===null) return;
  const t=blankTrip(name||'次の旅行');
  state.trips.push(t); state.currentTripId=t.id; save();
});
document.getElementById('tripSelect').addEventListener('change',e=>{
  state.currentTripId=e.target.value; save();
});
document.getElementById('modalBg').addEventListener('click',e=>{
  if(e.target.id==='modalBg') closeModal();
});

// main 内のクリック（委譲）
document.getElementById('main').addEventListener('click',e=>{
  const t=curTrip();
  const like=e.target.closest('[data-like]');
  if(like){
    const c=t.candidates.find(x=>x.id===like.dataset.like);
    const mi=+like.dataset.mi;
    c.likedBy=c.likedBy||[];
    if(c.likedBy.includes(mi)) c.likedBy=c.likedBy.filter(x=>x!==mi);
    else c.likedBy.push(mi);
    save(); return;
  }
  const pack=e.target.closest('[data-pack]');
  if(pack && !e.target.closest('[data-del]')){
    const p=t.packing.find(x=>x.id===pack.dataset.pack);
    p.checked=!p.checked; save(); return;
  }
  const wd=e.target.closest('[data-wishdone]');
  if(wd){ const w=t.wishlist.find(x=>x.id===wd.dataset.wishdone); w.done=!w.done; save(); return; }
  const del=e.target.closest('[data-del]');
  if(del){
    const key=TYPE_KEY[del.dataset.del];
    if(confirm('削除しますか？')){ t[key]=t[key].filter(x=>x.id!==del.dataset.id); save(); }
    return;
  }
  // カードをタップして編集（リンクは除外）
  if(e.target.closest('a')) return;
  const ec=e.target.closest('[data-edit-type]');
  if(ec){ openForm(ec.dataset.editType, findItem(ec.dataset.editType, ec.dataset.id)); }
});

// モーダル内の保存ボタン（委譲）
document.getElementById('modal').addEventListener('click',e=>{
  const sv=e.target.closest('[data-save]');
  if(sv){ saveFromModal(sv.dataset.save, sv.dataset.edit||null); }
  const cl=e.target.closest('[data-close]');
  if(cl){ closeModal(); }
});

/* ============================================================
   フォーム部品 & ユーティリティ
============================================================ */
function formCard(title,type,inner,editId){
  return `<h3>${title}</h3>${inner}
    <div class="modal-actions">
      <button class="btn ghost" data-close>キャンセル</button>
      <button class="btn primary" data-save="${type}" data-edit="${editId||''}">${editId?'保存':'追加'}</button>
    </div>`;
}
function f(label,id,ph,type,value){ return `<div class="field"><label>${label}</label>
  <input id="${id}" type="${type||'text'}" placeholder="${ph||''}" value="${esc(value??'')}" /></div>`; }
function fArea(label,id,ph,value){ return `<div class="field"><label>${label}</label>
  <textarea id="${id}" placeholder="${ph||''}">${esc(value??'')}</textarea></div>`; }
function fDate(label,id,value){ return `<div class="field"><label>${label}</label>
  <input id="${id}" type="date" value="${esc(value??'')}" /></div>`; }
function fSel(label,id,opts,value){ return `<div class="field"><label>${label}</label>
  <select id="${id}">${opts.map((o,i)=>{const v=(typeof o==='string'?o:i);
    return `<option value="${v}" ${String(v)===String(value)?'selected':''}>${esc(o)}</option>`;}).join('')}</select></div>`; }

function secTitle(t,hint){ return `<div class="sec-title"><h2>${t}</h2><span class="hint">${hint||''}</span></div>`; }
function empty(em,t,s){ return `<div class="empty"><span class="em">${em}</span><b>${t}</b><br><span style="font-size:13px">${s}</span></div>`; }
function linkHtml(url){ if(!url)return''; const u=/^https?:\/\//.test(url)?url:'https://'+url;
  return `<a class="link" href="${esc(u)}" target="_blank" rel="noopener">🔗 リンクを開く</a>`; }

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ return Math.round(n).toLocaleString('ja-JP'); }
function daysUntil(d){ const t=new Date(d+'T00:00:00'); const now=new Date(); now.setHours(0,0,0,0);
  return Math.round((t-now)/86400000); }
function fmtDay(d){ const dt=new Date(d+'T00:00:00'); const w=['日','月','火','水','木','金','土'][dt.getDay()];
  return `${dt.getMonth()+1}月${dt.getDate()}日(${w})`; }
function fmtRange(s,e){ if(!s)return''; if(!e||e===s)return fmtShort(s); return `${fmtShort(s)}〜${fmtShort(e)}`; }
function fmtShort(d){ const dt=new Date(d+'T00:00:00'); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtDateTime(dt){ try{ const d=new Date(dt); const w=['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${w}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}catch(e){return dt;} }

/* ============================================================
   起動
============================================================ */
render();
initSync();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
